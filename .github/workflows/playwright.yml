name: Playwright Tests
on:
  # Manual trigger with input parameters for environment and test type
  workflow_dispatch:
    inputs:
      environment:
        description: "Choose Environment to Run Tests Against"
        required: true
        default: "UAT"
        type: choice
        options: ["Staging", "Demo", "UAT"]
      test_type:
        description: "Choose Test Suite to Run"
        required: true
        default: "Smoke"
        type: choice
        options: ["Smoke", "Regression"]
      test_name_filter:
        description: "Optional: Filter tests by name (regex supported)"
        required: false
        default: ""
        type: string
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: lts/*
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps
      - name: Run Playwright tests
        env:
          ENVIRONMENT: ${{ github.event.inputs.environment }}
          TEST_TYPE: ${{ github.event.inputs.test_type }}
          TEST_NAME_FILTER: ${{ github.event.inputs.test_name_filter }}
        run: |
          if [ -z "$TEST_NAME_FILTER" ]; then
            npx playwright test --grep "@$TEST_TYPE" --grep "@$ENVIRONMENT"
          else
            npx playwright test --grep "$TEST_NAME_FILTER" --grep "@$TEST_TYPE" --grep "@$ENVIRONMENT"
          fi
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
