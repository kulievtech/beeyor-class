name: Playwright Tests
on:
  # Manual trigger with input parameters for test type
  workflow_dispatch:
    inputs:
      test_type:
        description: "Choose Test Suite to Run"
        required: true
        default: "smoke"
        type: choice
        options: ["smoke", "regression"]
      test_name_filter:
        description: "Optional: Filter tests by name (regex supported)"
        required: false
        default: ""
        type: string
  # Scheduled — runs automatically
  schedule:
    - cron: "0 5 * * 1-5" # 12:00 AM (midnight) EST
    - cron: "0 17 * * 1-5" # 12:00 PM (noon) EST

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: lts/*
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps
      - name: Run Playwright tests
        env:
          TEST_TYPE: ${{ github.event.inputs.test_type }}
          TEST_NAME_FILTER: ${{ github.event.inputs.test_name_filter }}
        run: |
          if [ -z "$TEST_NAME_FILTER" ]; then
            npx playwright test --grep "@$TEST_TYPE"
          else
            npx playwright test --grep "$TEST_NAME_FILTER"
          fi
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
