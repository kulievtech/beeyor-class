name: Playwright Tests
on:
  schedule:
    - cron: "0 6 * * 1-5"
    - cron: "0 17 * * 1-5"
  workflow_dispatch:
    inputs:
      testNamePattern:
        description: "Test name pattern (regex)"
        required: false
        default: ""
        type: string
      testTags:
        description: "Test tags filter"
        required: false
        type: choice
        default: ""
        options:
          - "@smoke"
          - "@regression"
          - "@critical"
      environment:
        description: "Target environment"
        required: false
        type: choice
        default: "staging"
        options:
          - "staging"
          - "production"
          - "development"
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps
      - name: Run Playwright tests
        run: npx playwright test ${{ inputs.testNamePattern && format('--grep {0}', inputs.testNamePattern) || (inputs.testTags && format('--grep {0}', inputs.testTags)) }}
        env:
          TEST_ENV: ${{ inputs.environment || 'staging' }}
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
