name: Playwright Tests
on:
  schedule:
    - cron: "0 6 * * 1-5"
    - cron: "0 17 * * 1-5"
  workflow_dispatch:
    inputs:
      testNamePattern:
        description: "Test name pattern (regex)"
        required: false
        default: ""
        type: string
      testTags:
        description: "Test tags filter"
        required: false
        type: choice
        default: ""
        options:
          - "@smoke"
          - "@regression"
          - "@critical"
      environment:
        description: "Target environment"
        required: false
        type: choice
        default: "staging"
        options:
          - "staging"
          - "production"
          - "development"
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: "npm"
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright Browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps
      - name: Install Playwright system deps (cached browsers)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps
      - name: Run Playwright tests
        run: |
          GREP_ARGS=""
          if [ -n "${{ inputs.testNamePattern }}" ]; then
            GREP_ARGS="--grep '${{ inputs.testNamePattern }}'"
          elif [ -n "${{ inputs.testTags }}" ]; then
            GREP_ARGS="--grep '${{ inputs.testTags }}'"
          fi
          npx playwright test $GREP_ARGS
        env:
          TEST_ENV: ${{ inputs.environment || 'staging' }}
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
